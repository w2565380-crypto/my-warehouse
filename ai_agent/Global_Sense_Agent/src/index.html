<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Global Sense AI Analyzer</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
            background: #f7f9fc;
        }

        h2 {
            text-align: center;
        }

        .box {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            padding: 12px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        #result {
            margin-top: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .loading {
            color: #666;
            font-style: italic;
        }

        ul {
            padding-left: 20px;
        }

        li {
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

<h2>🌍 Global Sense - 商品智能分析</h2>

<div class="box">
    <input type="text" id="url" 
           value="http://books.toscrape.com/catalogue/a-light-in-the-attic_1000/index.html">
    <button onclick="startAnalyze()">分析</button>
</div>

<div id="result">
    等待任务输入...
</div>

<script>
window.startAnalyze = async function () {
    const url = document.getElementById('url').value;
    const resBox = document.getElementById('result');

    resBox.innerHTML = '<div class="loading">⏳ Agent 执行中：抓取 → 分析 → 保存...</div>';

    try {
        const response = await fetch(`http://127.0.0.1:8080/analyze?url=${encodeURIComponent(url)}`);
        const json = await response.json();

        console.log("后端返回:", json);

        if (json.status !== "success") {
            resBox.innerHTML = `<div class="card">❌ 错误：${json.message}</div>`;
            return;
        }

        const data = json.data;
        const analysis = data.analysis;

        if (!analysis) {
            resBox.innerHTML = `<div class="card">⚠️ 未返回 analysis 数据</div>`;
            return;
        }

        // ✅ 渲染 UI（产品级展示）
        resBox.innerHTML = `
            <div class="card">
                <h3>📦 ${analysis.product_name || "未知产品"}</h3>
                <p>📅 分析时间：${analysis.analysis_date || "-"}</p>
            </div>

            <div class="card">
                <h4>😣 用户痛点</h4>
                <ul>
                    ${(analysis.pain_points || []).map(p => `<li>${p}</li>`).join("")}
                </ul>
            </div>

            <div class="card">
                <h4>✅ 产品优势</h4>
                <ul>
                    ${(analysis.advantages || []).map(a => `<li>${a}</li>`).join("")}
                </ul>
            </div>

            <div class="card">
                <h4>🚀 改进机会</h4>
                <ul>
                    ${(analysis.opportunities || []).map(o => `<li>${o}</li>`).join("")}
                </ul>
            </div>

            <div class="card">
                <h4>⚠️ 评论风险评估</h4>
                <p><b>风险等级：</b>${analysis.fake_review_warning?.risk_level || "-"}</p>
                <p><b>观察：</b>${analysis.fake_review_warning?.observations || "-"}</p>
            </div>
        `;

    } catch (err) {
        resBox.innerHTML = `<div class="card">🌐 网络错误：${err}</div>`;
    }
}
</script>

</body>
</html>
